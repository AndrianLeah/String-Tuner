<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1e0a3c"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="a1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a2" cx="82%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a3" cx="78%" cy="16%" r="45%">
      <stop offset="0%" stop-color="#c026d3" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c026d3" stop-opacity="0"/>
    </radialGradient>
    <!-- Fork gradient: top of prongs (y=8) to handle bottom (y=43) -->
    <linearGradient id="f" x1="24" y1="8" x2="24" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ede6ff"/>
      <stop offset="100%" stop-color="#b89efb"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>
  <rect width="48" height="48" rx="11" fill="url(#a1)"/>
  <rect width="48" height="48" rx="11" fill="url(#a2)"/>
  <rect width="48" height="48" rx="11" fill="url(#a3)"/>
  <!--
    Fork (centered at x=24):
      Left prong:   x=14.5, y=8,  w=5, h=19, rx=2.5
      Right prong:  x=28.5, y=8,  w=5, h=19, rx=2.5
      U-connector:  x=14.5, y=22, w=19, h=9,  rx=4.5
      Handle:       x=21.5, y=26, w=5,  h=17, rx=2.5
  -->
  <rect x="14.5" y="8"  width="5" height="19" rx="2.5" fill="url(#f)"/>
  <rect x="28.5" y="8"  width="5" height="19" rx="2.5" fill="url(#f)"/>
  <rect x="14.5" y="22" width="19" height="9"  rx="4.5" fill="url(#f)"/>
  <rect x="21.5" y="26" width="5"  height="17" rx="2.5" fill="url(#f)"/>
</svg>
